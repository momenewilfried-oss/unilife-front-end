<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNILIFE - Gestion des notes</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/logo.png.png" type="image/png">
    <link rel="apple-touch-icon" href="/logo.png.png">
    <meta name="theme-color" content="#2563eb">

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "/login.html";
    </script>
</head>
<body>
    <!-- Ton header avec bouton Installer -->
    <header class="header">
        <div class="header-left">
            <img src="/logo.png.png" alt="UNILIFE Logo" class="header-logo">
            <div class="header-title">
                <span class="main-title">UNILIFE</span>
                <small>Gestion des notes</small>
            </div>
        </div>

        <button class="theme-btn" onclick="toggleTheme()" title="Changer le thème">
            <i class="fa-solid fa-moon"></i>
        </button>

        <div class="user-info">
            <i class="fa-solid fa-user"></i>
            <span id="userInfo">Loading...</span>
        </div>

        <button class="logout-btn" onclick="logout()" title="Déconnexion">
            <i class="fa-solid fa-right-from-bracket"></i>
        </button>

        <button id="installBtn" class="download-app-btn" style="display:none;" onclick="installApp()">
            <i class="fa-solid fa-download"></i>
            Installer l'application
        </button>
    </header>

    <!-- Le reste de ton contenu (container, cards, etc.) reste IDENTIQUE -->
    <div class="container">
        <!-- ... copie tout ton contenu actuel ici ... -->
    </div>

    <footer class="footer"> <!-- ton footer --> </footer>

    <script>
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'inline-flex';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('installBtn').style.display = 'none';
                }
                deferredPrompt = null;
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>

    <script src="/dashboard.js"></script>
</body>
</html>
