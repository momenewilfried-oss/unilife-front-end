<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - UNILIFE</title>

    <link rel="stylesheet" href="style2.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="auth-container">

    <div class="card">

        <h2>Nouveau mot de passe</h2>

        <p>
            Entrez votre nouveau mot de passe.
        </p>

        <input
            type="password"
            id="password"
            placeholder="Nouveau mot de passe"
        >

        <button id="resetBtn" onclick="updatePassword()">

            <span id="resetText">
                Modifier le mot de passe
            </span>

            <span id="resetLoader" style="display:none;">
                <i class="fa-solid fa-spinner fa-spin"></i>
                Modification...
            </span>

        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
    "https://mmsaxylyrblsykdyzozr.supabase.co",
    "sb_publishable_Vata7Z0f2BWsJzm51wDVkg_ewNsBo8g"
);

/* =========================
   RÉCUP SESSION RESET
========================= */
const params = new URLSearchParams(window.location.hash.replace('#', '?'));

const access_token = params.get("access_token");
const refresh_token = params.get("refresh_token");

if (access_token && refresh_token) {
    supabaseClient.auth.setSession({
        access_token,
        refresh_token
    });
}

/* =========================
   UPDATE PASSWORD
========================= */
async function updatePassword() {

    const password = document.getElementById("password").value;

    if (!password) {
        alert("Mot de passe requis");
        return;
    }

    const { error } = await supabaseClient.auth.updateUser({
        password: password
    });

    if (error) {
        console.error(error);
        alert(error.message);
    } else {
        alert("Mot de passe modifié avec succès");
        window.location.href = "login.html";
    }
}

</script>

</body>
</html>
