<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié - UNILIFE</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="auth-container">
    <div class="card">
        <h2>Mot de passe oublié ?</h2>
        <p>Entrez votre adresse email. Nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>

        <input type="email" id="email" placeholder="Votre email" autocomplete="email">
        
        <button id="resetBtn" onclick="sendResetLink()">
            <span id="resetText">Envoyer le lien</span>
            <span id="resetLoader" style="display:none;">
                <i class="fa-solid fa-spinner fa-spin"></i> Envoi en cours...
            </span>
        </button>

        <p><a href="login.html">← Retour à la connexion</a></p>
    </div>
</div>

<script src="auth.js"></script>
</body>
</html>
