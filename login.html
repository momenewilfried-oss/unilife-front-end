<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Login - UNILIFE</title>

    <link rel="stylesheet" href="style2.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    >

</head>

<body>

<div class="auth-container">

    <div class="card">

        <h2>Connexion</h2>

        <input
            id="email"
            type="email"
            placeholder="Email"
        >

        <input
            id="password"
            type="password"
            placeholder="Mot de passe"
        >

        <button
            id="loginBtn"
            onclick="login()"
        >

            <span id="loginText">
                Se connecter
            </span>

            <span
                id="loginLoader"
                style="display:none;"
            >
                <i class="fa-solid fa-spinner fa-spin"></i>
                Chargement...
            </span>

        </button>

        <p>
            Pas de compte ?

            <a href="register.html">
                Créer un compte
            </a>
        </p>

    </div>

</div>

<script src="auth.js"></script>

</body>
</html>
